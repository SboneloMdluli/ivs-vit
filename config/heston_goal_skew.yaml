heston_ranges:
  rho: [-0.95, -0.6]
  sigma: [0.6, 1.0]
  theta: [0.06, 0.20]
  kappa: [1.5, 2.5]
  v0: [0.06, 0.20]

implied_vol:
  m_extrapolate_below: 0.52
  tau_extrapolate_below: 0.05

heston_cos_pricer:
  n_terms_max: 6144

grid:
