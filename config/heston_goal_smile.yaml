# smile (rho ~ 0 -> symmetric curvature; high vol-of-vol drives curvature)
heston_ranges:
  rho: [-0.15, 0.15]
  sigma: [0.7, 1.2]
  theta: [0.06, 0.20]
  kappa: [1.5, 2.5]
  v0: [0.06, 0.20]

implied_vol:
  tau_extrapolate_below: 0.05

heston_cos_pricer:
  n_terms_max: 6144

grid:
  moneyness:
    start_point: 0.35
    step: 0.1
    end_point: 1.65

plot_surface:
  zlim: [0.0, 1]
