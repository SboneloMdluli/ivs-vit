market:
  spot: 100.0
  dividend_yield: 0.0

# Heston parameter ranges
heston_ranges:
  v0: [0.02, 0.35]
  rho: [-0.95, 0.95]
  sigma: [0.08, 1.2]
  theta: [0.01, 0.35]
  kappa: [0.5, 8.0]
  r: [0.0, 0.08]

# Latin Hypercube sampling
lhs:
  # Total surfaces = n_samples * n_batches
  n_samples: 100
  seed: 42
  n_batches: 4
  seed_stride: 10000
  log_uniform:
    - v0
    - sigma
    - theta
    - kappa

# Black–Scholes inversion (Jäckel + Newton + Brent)
implied_vol:
  sigma_lo: 1.0e-4
  sigma_hi: 5.0
  brent_xtol: 1.0e-8
  newton_refinement_steps: 3
  newton_tol: 1.0e-10
  jackel_iterations: 2
  vega_floor_scale: 1.0e-14

# Heston-COS (Fang & Oosterlee)
heston_cos_pricer:
  n_terms: 1024
  truncation_L: 14.0
  short_tau_tau_ref: 0.25
  n_terms_max: 4096
