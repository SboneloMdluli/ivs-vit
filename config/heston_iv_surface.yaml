market:
  spot: 100.0
  dividend_yield: 0.0

heston_ranges:
  v0: [0.04, 0.4]
  rho: [-0.9, -0.2]
  sigma: [0.3, 1.0]
  theta: [0.04, 0.4]
  kappa: [0.5, 3.0]
  r: [0.0, 0.05]

# Latin Hypercube sampling
lhs:
  # Total surfaces = n_samples * n_batches
  n_samples: 100
  seed: 42
  n_batches: 4
  seed_stride: 10000
  log_uniform:
    - v0
    - sigma
    - theta
    - kappa
  # Safety margin for the Feller clip applied to sigma_v: 2*kappa*theta >= sigma_v^2 + feller_eps.
  feller_eps: 0.01

# Black–Scholes inversion
implied_vol:
  sigma_lo: 1.0e-4
  sigma_hi: 10.0

  tau_extrapolate_below: 0.05
  m_extrapolate_below: 0.0
  intrinsic_nudge_scale: 1.0e-10
  newton_refinement_steps: 3
  newton_tol: 1.0e-10
  # Brent fallback (used only when Newton stalls or vega is tiny)
  brent_xtol: 1.0e-8
  vega_floor_scale: 1.0e-14

# Heston-COS (Fang & Oosterlee)
heston_cos_pricer:
  n_terms: 1024
  truncation_l: 14.0
  short_tau_tau_ref: 0.25
  n_terms_max: 6144

# Sequences of IV surfaces along a risk-neutral Heston path
sequential_ivs:
  n_steps: 8
  dt: 0.003968253968253968 # 1/252
  path_seed_stride: 100000

# Arbitrage guard applied to every emitted surface.
# policy: none | warn | repair | filter | raise
arbitrage_guard:
  policy: repair
  tol: 1.0e-8
  repair_before_filter: true
