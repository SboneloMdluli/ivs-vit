# Optional scenario overlays: heston_goal_*.yaml (see implied_volatility_diffusion.synthetic_ivs_generator.heston_iv_goals).

market:
  spot: 100.0
  dividend_yield: 0.0

# Heston parameter ranges (LHS). Kept moderate so COS prices stay within BS inversion
# when ``implied_vol.sigma_hi`` is 1 (100% vol cap).
heston_ranges:
  v0: [0.02, 0.35]
  rho: [-0.95, -0.08]
  sigma: [0.12, 1.25]
  theta: [0.01, 0.35]
  kappa: [0.5, 8.0]
  r: [0.0, 0.08]

# Latin Hypercube sampling
lhs:
  # Total surfaces = n_samples * n_batches
  n_samples: 100
  seed: 42
  n_batches: 4
  seed_stride: 10000
  log_uniform:
    - v0
    - sigma
    - theta
    - kappa

# Black–Scholes inversion (Jäckel + Newton + Brent)
implied_vol:
  sigma_lo: 1.0e-4
  sigma_hi: 1.0
  # Very short tau (e.g. prepended 0.05y) + deep ITM: time value is tiny so BS inversion
  # from COS prices can spike; copy IV from the first column with tau >= threshold.
  tau_extrapolate_below: 0.15
  # Optional: rows with m below this use the first row with m >= threshold (skew grids).
  m_extrapolate_below: 0.0
  brent_xtol: 1.0e-8
  newton_refinement_steps: 3
  newton_tol: 1.0e-10
  jackel_iterations: 2
  vega_floor_scale: 1.0e-14

# Heston-COS (Fang & Oosterlee)
heston_cos_pricer:
  n_terms: 1024
  truncation_L: 14.0
  short_tau_tau_ref: 0.25
  n_terms_max: 4096

# Sequences of IV surfaces along a risk-neutral Heston path (Euler spot + variance)
sequential_ivs:
  n_steps: 8
  dt: 0.003968253968253968 # 1/252
  path_seed_stride: 100000
