# Moneyness & maturity grid
grid:
  moneyness:
    # K / S0 in [0.5, 2.5]
    start_point: 0.5
    step: 0.1
    end_point: 2.5
  tau:
    # Time to maturity in [0.1, 2.0] year fractions.
    start_point: 0.1
    step: 0.2
    end_point: 2.0

plot_surface:
  zlim: [0, 1]
  elev: 30
  azim: -42
  cmap: turbo
