# Moneyness / maturity grid and matplotlib defaults for implied-volatility surface plots.

grid:
  moneyness:
    start_point: 0.5
    step: 0.1
    end_point: 1.5
  tau:
    start_point: 0.2
    step: 0.2
    end_point: 1.0
    prepend:
      - 0.05

plot_surface:
  zlim: [0, 1]
  # 3D view: similar to finance IV surface figures (elevated front corner).
  elev: 30
  azim: -42
  cmap: turbo
