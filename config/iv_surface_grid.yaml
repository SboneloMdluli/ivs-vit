# Moneyness / maturity grid and matplotlib defaults for implied-volatility surface plots.

grid:
  moneyness:
    start_point: 0.6
    step: 0.1
    end_point: 1.4
  tau:
    start_point: 0.2
    step: 0.2
    end_point: 1.0
    prepend:
      - 0.05

plot_surface:
  zlim: [0.05, 0.8]
  elev: 22
  azim: -125
  cmap: turbo
