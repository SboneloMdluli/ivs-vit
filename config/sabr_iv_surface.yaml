# SABR (Hagan) implied volatility on a fixed moneyness × tau grid.
# Synthetic LHS over (alpha, rho, nu); beta fixed under sabr.beta.

market:
  spot: 100.0
  dividend_yield: 0.0
  r: 0.03

sabr:
  beta: 0.5

sabr_ranges:
  alpha: [0.05, 0.45]
  rho: [-0.85, 0.85]
  nu: [0.05, 0.9]

grid:
  moneyness:
    start_point: 0.6
    step: 0.1
    end_point: 1.4
  tau:
    start_point: 0.2
    step: 0.2
    end_point: 1.0
    prepend:
      - 0.05

lhs:
  n_samples: 32
  seed: 7
  n_batches: 1
  seed_stride: 10000
  log_uniform:
    - alpha
    - nu

plot_surface:
  zlim: [0.05, 0.8]
  elev: 22
  azim: -125
  cmap: turbo
