# SABR (Hagan) implied volatility on a fixed moneyness × tau grid.
# Synthetic LHS over (alpha, rho, nu); beta fixed under sabr.beta.

market:
  spot: 100.0
  dividend_yield: 0.0
  r: 0.03

sabr:
  beta: 0.5

sabr_ranges:
  alpha: [0.05, 0.45]
  rho: [-0.85, 0.85]
  nu: [0.05, 0.9]

grid:
  moneyness:
    start_point: 0.6
    step: 0.1
    end_point: 1.4
  tau:
    start_point: 0.05
    step: 0.05
    end_point: 2.0

lhs:
  n_samples: 32
  seed: 7
  n_batches: 1
  seed_stride: 10000
  log_uniform:
    - alpha
    - nu

# Sequences of IV surfaces along a SABR SDE path
sequential_ivs:
  n_steps: 8
  dt: 0.003968253968253968 # 1/252
  path_seed_stride: 100000

# Arbitrage guard applied to every emitted surface.
# policy: none | warn | repair | filter | raise
arbitrage_guard:
  policy: repair
  tol: 1.0e-8
  repair_before_filter: true

plot_surface:
  zlim: [0.05, 0.8]
  elev: 22
  azim: -125
  cmap: turbo
